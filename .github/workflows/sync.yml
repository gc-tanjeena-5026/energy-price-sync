name: JEPX Master All-City Sync
on:
  schedule:
    - cron: "45 * * * *" 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install requests pandas

      - name: Run Sync
        env:
          M_API: ${{ secrets.MAIRA_API_KEY }}
          M_PROJ: ${{ secrets.MAIRA_PROJECT_KEY }}
          M_ID: ${{ secrets.MAIRA_DATASET_ID }}
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import io
          import os
          from datetime import datetime

          # 1. Get Data from JEPX
          url = "https://www.jepx.jp/market/excel/spot_2026.csv"
          df = pd.read_csv(url, encoding='shift_jis')
          
          # 2. FILTER FOR TODAY ONLY
          # JEPX uses YYYY/MM/DD. This ensures we start from "Today"
          today_str = datetime.now().strftime('%Y/%m/%d')
          df_today = df[df.iloc[:, 0] == today_str].copy()

          if df_today.empty:
              print(f"No data for {today_str} yet. Using last 48 slots as fallback.")
              df_today = df.tail(48).copy()

          # 3. FORMAT TIME & GRAB ALL REGIONS
          def to_iso(row):
              d, s = row.iloc[0].replace('/', '-'), int(row.iloc[1])
              return f"{d}T{(s-1)//2:02}:{'00' if s%2!=0 else '30'}:00Z"
          
          # Mapping every JEPX column to its region name
          final_df = pd.DataFrame()
          final_df['timestamp'] = df_today.apply(to_iso, axis=1)
          final_df['hokkaido']  = df_today.iloc[:, 4].astype(float)
          final_df['tohoku']    = df_today.iloc[:, 5].astype(float)
          final_df['tokyo']     = df_today.iloc[:, 11].astype(float)
          final_df['chubu']     = df_today.iloc[:, 12].astype(float)
          final_df['hokuriku']  = df_today.iloc[:, 13].astype(float)
          final_df['kansai']    = df_today.iloc[:, 14].astype(float)
          final_df['chugoku']   = df_today.iloc[:, 15].astype(float)
          final_df['shikoku']   = df_today.iloc[:, 16].astype(float)
          final_df['kyushu']    = df_today.iloc[:, 19].astype(float)

          # 4. Push to Maira
          csv_buf = io.BytesIO()
          final_df.to_csv(csv_buf, index=False)
          csv_buf.seek(0)

          ds_id = os.environ['M_ID'].strip()
          api_url = f"https://api.recommender.gigalogy.com/v1/gpt/datasets_ts/{ds_id}/file"
          
          headers = {
              "api-key": os.environ['M_API'].strip(),
              "project-key": os.environ['M_PROJ'].strip()
          }
          
          files = {'dataset_file': ('all_japan_energy.csv', csv_buf, 'text/csv')}
          response = requests.put(api_url, headers=headers, files=files)
          
          print(f"Syncing data for: {today_str}")
          print(f"Status: {response.status_code}")
          print(f"Result: {response.text}")
          EOF
