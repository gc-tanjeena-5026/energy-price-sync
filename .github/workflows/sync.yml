name: Kankyo-Ichiba Master All-Region Sync
on:
  schedule:
    - cron: "50 * * * *" # Runs 10 mins before the hour
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install requests pandas beautifulsoup4

      - name: Scrape All Regions
        env:
          M_API: ${{ secrets.MAIRA_API_KEY }}
          M_PROJ: ${{ secrets.MAIRA_PROJECT_KEY }}
          M_ID: ${{ secrets.MAIRA_DATASET_ID }}
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import pandas as pd
          import io
          import os
          from datetime import datetime

          # Every regional site on Kankyo-Ichiba
          regions = {
              "hokkaido": "https://kankyo-ichiba.jp/hokkaido",
              "tohoku": "https://kankyo-ichiba.jp/tohoku",
              "tokyo": "https://kankyo-ichiba.jp/tokyo",
              "chubu": "https://kankyo-ichiba.jp/chubu",
              "hokuriku": "https://kankyo-ichiba.jp/hokuriku",
              "kansai": "https://kankyo-ichiba.jp/kansai",
              "chugoku": "https://kankyo-ichiba.jp/chugoku",
              "shikoku": "https://kankyo-ichiba.jp/shikoku",
              "kyushu": "https://kankyo-ichiba.jp/kyushu"
          }

          all_frames = []
          today_date = datetime.now().strftime('%Y-%m-%d')

          for name, url in regions.items():
              try:
                  print(f"Scraping {name}...")
                  res = requests.get(url, timeout=10)
                  soup = BeautifulSoup(res.text, 'html.parser')
                  
                  # Find the table - Kankyo-Ichiba usually puts prices in <td> inside <tr>
                  data_list = []
                  for row in soup.find_all('tr'):
                      cols = row.find_all('td')
                      if len(cols) >= 2:
                          time_text = cols[0].text.strip() # e.g., "10:30"
                          price_text = cols[1].text.strip().replace('円', '').replace(',', '')
                          
                          try:
                              price_val = float(price_text)
                              timestamp = f"{today_date}T{time_text}:00Z"
                              data_list.append({"timestamp": timestamp, name: price_val})
                          except ValueError:
                              continue
                  
                  if data_list:
                      all_frames.append(pd.DataFrame(data_list).set_index('timestamp'))
              except Exception as e:
                  print(f"Failed to scrape {name}: {e}")

          # Combine all regions into one big table
          if all_frames:
              final_df = pd.concat(all_frames, axis=1).sort_index().reset_index()
              
              # Push to Maira
              csv_buf = io.BytesIO()
              final_df.to_csv(csv_buf, index=False)
              csv_buf.seek(0)

              ds_id = os.environ['M_ID'].strip()
              api_url = f"https://api.recommender.gigalogy.com/v1/gpt/datasets_ts/{ds_id}/file"
              headers = {
                  "api-key": os.environ['M_API'].strip(),
                  "project-key": os.environ['M_PROJ'].strip()
              }
              
              response = requests.put(api_url, headers=headers, files={'dataset_file': ('all_japan.csv', csv_buf, 'text/csv')})
              print(f"Final Status: {response.status_code}")
              print(f"Maira Response: {response.text}")
          else:
              print("No data collected from any site.")
          EOF
