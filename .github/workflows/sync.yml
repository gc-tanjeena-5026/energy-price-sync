name: JEPX Daily Master Sync
on:
  schedule:
    # Runs once a day at 17:00 JST (08:00 UTC)
    - cron: "0 8 * * *" 
  workflow_dispatch: # Allows you to run it manually whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install requests pandas

      - name: Run Daily Sync
        env:
          M_API: ${{ secrets.MAIRA_API_KEY }}
          M_PROJ: ${{ secrets.MAIRA_PROJECT_KEY }}
          M_ID: ${{ secrets.MAIRA_DATASET_ID }}
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import io
          import os
          from datetime import datetime, timedelta

          # 1. Fetch Official Data
          url = "https://www.jepx.jp/market/excel/spot_2026.csv"
          df = pd.read_csv(url, encoding='shift_jis')
          
          # 2. Get Today and Tomorrow for a 48-hour master block
          # This ensures we always have the most current "Live" and "Next Day" data
          target_dates = [
              datetime.now().strftime('%Y/%m/%d'),
              (datetime.now() + timedelta(days=1)).strftime('%Y/%m/%d')
          ]
          
          df_batch = df[df.iloc[:, 0].isin(target_dates)].copy()

          # 3. Format Time to ISO-8601
          def to_iso(row):
              d, s = row.iloc[0].replace('/', '-'), int(row.iloc[1])
              return f"{d}T{(s-1)//2:02}:{'00' if s%2!=0 else '30'}:00Z"
          
          final_df = pd.DataFrame()
          final_df['timestamp'] = df_batch.apply(to_iso, axis=1)
          
          # Mapping all regions (The same columns as before)
          regions = {
              'hokkaido': 4, 'tohoku': 5, 'tokyo': 11, 'chubu': 12, 
              'hokuriku': 13, 'kansai': 14, 'chugoku': 15, 'shikoku': 16, 'kyushu': 19
          }
          
          for name, col_idx in regions.items():
              final_df[name] = df_batch.iloc[:, col_idx].astype(float)

          # 4. Push to Maira (Hitting the TS File Endpoint)
          csv_buf = io.BytesIO()
          final_df.to_csv(csv_buf, index=False)
          csv_buf.seek(0)

          ds_id = os.environ['M_ID'].strip()
          api_url = f"https://api.recommender.gigalogy.com/v1/gpt/datasets_ts/{ds_id}/file"
          headers = {
              "api-key": os.environ['M_API'].strip(),
              "project-key": os.environ['M_PROJ'].strip()
          }
          
          response = requests.put(api_url, headers=headers, files={'dataset_file': ('daily_batch.csv', csv_buf, 'text/csv')})
          
          print(f"Daily Sync for {target_dates}")
          print(f"Maira Endpoint: {api_url}")
          print(f"Status: {response.status_code} | Result: {response.text}")
          EOF
