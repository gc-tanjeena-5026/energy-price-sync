name: Kankyo-Ichiba Master All-Region Sync
on:
  schedule:
    - cron: "50 * * * *" 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install requests pandas beautifulsoup4 urllib3

      - name: Scrape All Regions
        env:
          M_API: ${{ secrets.MAIRA_API_KEY }}
          M_PROJ: ${{ secrets.MAIRA_PROJECT_KEY }}
          M_ID: ${{ secrets.MAIRA_DATASET_ID }}
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import pandas as pd
          import io
          import os
          import ssl
          from datetime import datetime
          from requests.adapters import HTTPAdapter
          from urllib3.poolmanager import PoolManager
          from urllib3.util import ssl_

          # FORCING MODERN TLS HANDSHAKE
          class TLSAdapter(HTTPAdapter):
              def init_poolmanager(self, connections, maxsize, block=False):
                  ctx = ssl_.create_urllib3_context(ssl_version=ssl.PROTOCOL_TLS_CLIENT)
                  ctx.options |= 0x4  # OP_LEGACY_SERVER_CONNECT to be extra safe
                  ctx.check_hostname = False
                  self.poolmanager = PoolManager(
                      num_pools=connections,
                      maxsize=maxsize,
                      block=block,
                      ssl_context=ctx
                  )

          regions = {
              "hokkaido": "https://kankyo-ichiba.jp/hokkaido",
              "tohoku": "https://kankyo-ichiba.jp/tohoku",
              "tokyo": "https://kankyo-ichiba.jp/tokyo",
              "chubu": "https://kankyo-ichiba.jp/chubu",
              "hokuriku": "https://kankyo-ichiba.jp/hokuriku",
              "kansai": "https://kankyo-ichiba.jp/kansai",
              "chugoku": "https://kankyo-ichiba.jp/chugoku",
              "shikoku": "https://kankyo-ichiba.jp/shikoku",
              "kyushu": "https://kankyo-ichiba.jp/kyushu"
          }

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
          }

          session = requests.Session()
          session.mount('https://', TLSAdapter())
          
          all_frames = []
          today_date = datetime.now().strftime('%Y-%m-%d')

          for name, url in regions.items():
              try:
                  print(f"Forcing connection to {name}...")
                  # verify=False is the 'cheat' to bypass SSL certificate issues
                  res = session.get(url, headers=headers, timeout=20, verify=False)
                  res.raise_for_status()
                  
                  soup = BeautifulSoup(res.text, 'html.parser')
                  data_list = []
                  
                  # Find all table rows
                  for row in soup.find_all('tr'):
                      cols = row.find_all('td')
                      if len(cols) >= 2:
                          time_text = cols[0].get_text(strip=True)
                          price_text = cols[1].get_text(strip=True).replace('円', '').replace(',', '').strip()
                          
                          try:
                              price_val = float(price_text)
                              timestamp = f"{today_date}T{time_text}:00Z"
                              data_list.append({"timestamp": timestamp, name: price_val})
                          except ValueError:
                              continue
                  
                  if data_list:
                      all_frames.append(pd.DataFrame(data_list).set_index('timestamp'))
              except Exception as e:
                  print(f"Failed to force scrape {name}: {e}")

          if all_frames:
              final_df = pd.concat(all_frames, axis=1).sort_index().reset_index()
              csv_buf = io.BytesIO()
              final_df.to_csv(csv_buf, index=False)
              csv_buf.seek(0)

              ds_id = os.environ['M_ID'].strip()
              api_url = f"https://api.recommender.gigalogy.com/v1/gpt/datasets_ts/{ds_id}/file"
              api_headers = {
                  "api-key": os.environ['M_API'].strip(),
                  "project-key": os.environ['M_PROJ'].strip()
              }
              
              response = requests.put(api_url, headers=api_headers, files={'dataset_file': ('all_japan.csv', csv_buf, 'text/csv')})
              print(f"Final Status: {response.status_code} | Result: {response.text}")
          else:
              print("Brute force failed. The site may be blocking GitHub IP addresses.")
          EOF
